server:
  port: 8085

spring:
  application:
    name: mybilibili-content-interaction
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/mybilibili?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 1
    mongodb:
      uri: mongodb://127.0.0.1:27017/mybilibili
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        import-check:
          enabled: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

minio:
  endpoint: http://127.0.0.1:9000
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://127.0.0.1:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: mybilibili

rocketmq:
  name-server: 127.0.0.1:9876

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 120000

logging:
  level:
    com.mybilibili: debug
    org.springframework.cloud.openfeign: debug

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
