# Nginx Configuration for MyBilibili Cloud Microservices
# 统一 API 前缀: /api/* → Gateway (8080)

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip压缩配置
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/x-javascript image/svg+xml;
    gzip_comp_level 6;

    # 上传文件大小限制
    client_max_body_size 4096M;

    # ========== 上游服务定义 ==========
    upstream gateway {
        server 127.0.0.1:8080;
    }

    # ========== 主服务器 ==========
    server {
        listen       80;
        server_name  localhost;

        # ==================== 用户前端 ====================
        location / {
            root   d:/files/mybilibili-next/mybilibili-cloud/mybilibili-web/dist;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # ==================== 管理端前端 ====================
        location /admin/ {
            alias d:/files/mybilibili-next/mybilibili-cloud/mybilibili-admin-web/dist/;
            index index.html;
            try_files $uri $uri/ /admin/index.html;
        }

        # ==================== 静态资源 ====================
        location /covers/ {
            alias d:/files/mybilibili/uploads/covers/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /videos/ {
            alias d:/files/mybilibili/uploads/videos/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /images/ {
            alias d:/files/mybilibili/uploads/images/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /uploads/ {
            alias d:/files/mybilibili/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /subtitles/ {
            alias d:/files/mybilibili/uploads/subtitles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ==================== API 统一入口 → Gateway ====================
        location /api/ {
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
        }

        # ==================== WebSocket → Gateway ====================
        location /ws/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # 错误页面
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }
    }
}