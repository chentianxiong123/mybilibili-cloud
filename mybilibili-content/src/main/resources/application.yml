server:
  port: 8083

spring:
  application:
    name: mybilibili-content
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/mybilibili?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: 127.0.0.1
    port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        import-check:
          enabled: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.mybilibili: debug

project:
  folder: d:/files/mybilibili/uploads

upload:
  base-path: d:/files/mybilibili/uploads
  avatar-path: d:/files/mybilibili/uploads/avatars
  video-path: d:/files/mybilibili/uploads/videos
  cover-path: d:/files/mybilibili/uploads/covers
  image-path: d:/files/mybilibili/uploads/images
  danmaku-path: d:/files/mybilibili/uploads/danmaku
  subtitle-path: d:/files/mybilibili/uploads/subtitles
