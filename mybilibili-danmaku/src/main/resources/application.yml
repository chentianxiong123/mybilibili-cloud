server:
  port: 8083

spring:
  application:
    name: mybilibili-danmaku
  main:
    allow-circular-references: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        import-check:
          enabled: false
  data:
    mongodb:
      uri: mongodb://127.0.0.1:27017/mybilibili
    redis:
      host: 127.0.0.1
      port: 6379
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

logging:
  level:
    com.mybilibili: debug