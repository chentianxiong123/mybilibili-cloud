version: '3.8'

services:
  namesrv:
    image: apache/rocketmq:4.9.4
    container_name: rocketmq-namesrv
    ports:
      - "9876:9876"
    volumes:
      - rocketmq-namesrv:/home/rocketmq
    environment:
      JAVA_OPT_EXT: "-Xms512m -Xmx512m -Xmn256m"
    command: ["sh", "mqnamesrv"]

  broker:
    image: apache/rocketmq:4.9.4
    container_name: rocketmq-broker
    ports:
      - "10911:10911"
      - "10909:10909"
    volumes:
      - rocketmq-broker:/home/rocketmq
    environment:
      JAVA_OPT_EXT: "-Xms1g -Xmx1g -Xmn512m"
      NAMESRV_ADDR: "namesrv:9876"
    command: ["sh", "mqbroker", "-n", "namesrv:9876", "-c", "/home/rocketmq/broker.conf"]
    depends_on:
      - namesrv

  console:
    image: apacherocketmq/rocketmq-console
    container_name: rocketmq-console
    ports:
      - "8082:8080"
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=namesrv:9876 -Dcom.rocketmq.sendMessageWithVIPChannel=false"
    depends_on:
      - namesrv

volumes:
  rocketmq-namesrv:
  rocketmq-broker: