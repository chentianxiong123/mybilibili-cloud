<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' file: slbundle:; worker-src 'self' blob: file: slbundle:; connect-src *; img-src * data: file: slbundle:; style-src 'self' 'unsafe-inline' file: slbundle:; font-src * data: file: slbundle:">
    <link href="vendor/roboto.css" rel="stylesheet">
    <link rel="stylesheet" href="vendor/flexboxgrid.min.css" type="text/css" >
    <script>
      global = globalThis;

      if (window.location.search.match('worker')) {
        let handlerHasRun = false;

        window['_startupErrorHandler'] = event => {
          if (handlerHasRun) return;
          handlerHasRun = true;

          const electron = require('electron');
          electron.ipcRenderer.send('startupError', event && event.message || 'Script load error');
        }

        window.addEventListener('error', window['_startupErrorHandler']);
      }
    </script>
    <script defer src="slbundle://bundles/vendors~renderer.js" onerror="window['_startupErrorHandler'] && window['_startupErrorHandler']()"></script>
    <script defer src="slbundle://bundles/renderer.js"  onerror="window['_startupErrorHandler'] && window['_startupErrorHandler']()"></script>
  </head>
  <body style="background-color: transparent;">
    <div id="app"></div>
  </body>
</html>
