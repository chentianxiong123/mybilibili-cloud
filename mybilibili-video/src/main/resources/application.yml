server:
  port: 8082

spring:
  application:
    name: mybilibili-video
  main:
    allow-circular-references: true
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/mybilibili?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf8&autoReconnect=true&allowMultiQueries=true&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 1
    mongodb:
      uri: mongodb://localhost:27017/mybilibili
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        import-check:
          enabled: false
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

minio:
  endpoint: http://127.0.0.1:9000
  access-key: ${MINIO_ACCESS_KEY:}
  secret-key: ${MINIO_SECRET_KEY:}
  bucket-name: mybilibili

upload:
  base-path: d:/files/mybilibili/processing

rocketmq:
  name-server: 127.0.0.1:9876

# Feign 连接 AI 服务的超时设置（视频处理是同步长任务）
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 600000

logging:
  level:
    com.mybilibili: debug
