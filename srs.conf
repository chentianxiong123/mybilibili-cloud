# SRS 配置文件 - 同时支持 RTMP (OBS) + WebRTC (浏览器)
listen 1935;
max_connections 1000;
daemon off;
srs_log_tank console;

http_api {
    enabled on;
    listen 1985;
}

http_server {
    enabled on;
    listen 28080;
    dir ./objs/nginx/html;
}

rtc_server {
    enabled on;
    listen 8000;
    candidate 192.168.31.204;
}

vhost __defaultVhost__ {
    hls {
        enabled on;
    }
    http_remux {
        enabled on;
        mount [vhost]/[app]/[stream].flv;
    }
    rtc {
        enabled on;
        rtmp_to_rtc off;
        rtc_to_rtmp on;
    }
    play {
        gop_cache_max_frames 30;
        queue_length 10;
    }
}