server:
  port: 8082

spring:
  application:
    name: mybilibili-video-media
  main:
    allow-circular-references: true
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/mybilibili?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf8&autoReconnect=true&allowMultiQueries=true&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 1
    mongodb:
      uri: mongodb://127.0.0.1:27017/mybilibili
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        import-check:
          enabled: false
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

minio:
  endpoint: http://127.0.0.1:9000
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://127.0.0.1:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: mybilibili

upload:
  base-path: D:/DockerFiles/mybilibili/processing

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: video-media-producer-group

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 600000

logging:
  level:
    com.mybilibili: info

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
