name: mybilibili-infra

services:
  mysql:
    image: mysql:5.7
    container_name: mybilibili-mysql
    restart: unless-stopped
    mem_limit: 384m
    cpus: 0.50
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --max-allowed-packet=512M
      - --max-connections=50
      - --innodb-buffer-pool-size=128M
      - --performance-schema=OFF
      - --table-open-cache=256
      - --tmp-table-size=32M
      - --max-heap-table-size=32M
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: mybilibili
    ports:
      - "3306:3306"
    volumes:
      - D:/DockerFiles/mybilibili/mysql/data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    container_name: mybilibili-redis
    restart: unless-stopped
    mem_limit: 160m
    cpus: 0.25
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - D:/DockerFiles/mybilibili/redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: mybilibili-nacos
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.75
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 128m
      JVM_XMX: 256m
      JVM_XMN: 64m
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - D:/DockerFiles/mybilibili/nacos/data:/home/nacos/data
      - D:/DockerFiles/mybilibili/nacos/logs:/home/nacos/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30

  mongodb:
    image: mongo:6.0
    container_name: mybilibili-mongodb
    restart: unless-stopped
    mem_limit: 384m
    cpus: 0.50
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    ports:
      - "27017:27017"
    volumes:
      - D:/DockerFiles/mybilibili/mongo/data:/data/db
      - D:/DockerFiles/mybilibili/mongo/config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: mybilibili-minio
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      GOMEMLIMIT: 192MiB
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - D:/DockerFiles/mybilibili/minio/data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  rocketmq-namesrv:
    image: apache/rocketmq:4.9.7
    container_name: mybilibili-rocketmq-namesrv
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.35
    working_dir: /home/rocketmq/rocketmq-4.9.7/bin
    environment:
      JAVA_OPT_EXT: "-server -Xms96m -Xmx160m -Xmn48m"
    command: ["sh", "mqnamesrv"]
    ports:
      - "127.0.0.1:9876:9876"
    volumes:
      - D:/DockerFiles/mybilibili/rocketmq/namesrv/logs:/home/rocketmq/logs

  rocketmq-broker:
    image: apache/rocketmq:4.9.7
    container_name: mybilibili-rocketmq-broker
    restart: unless-stopped
    mem_limit: 384m
    cpus: 0.75
    depends_on:
      - rocketmq-namesrv
    working_dir: /home/rocketmq/rocketmq-4.9.7/bin
    command:
      - sh
      - -lc
      - |
        nohup sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/conf/broker.conf >/home/rocketmq/logs/broker.stdout 2>&1 &
        tail -f /dev/null
    environment:
      JAVA_OPT_EXT: "-server -Xms160m -Xmx256m -Xmn96m"
    ports:
      - "127.0.0.1:10911:10911"
    volumes:
      - ./rocketmq/broker.conf:/home/rocketmq/conf/broker.conf:ro
      - D:/DockerFiles/mybilibili/rocketmq/broker/logs:/home/rocketmq/logs
      - D:/DockerFiles/mybilibili/rocketmq/broker/store:/home/rocketmq/store

  elasticsearch:
    build:
      context: ./elasticsearch
    image: mybilibili-elasticsearch-ik:7.17.18
    container_name: mybilibili-elasticsearch
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.75
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - D:/DockerFiles/mybilibili/elasticsearch/data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: mybilibili-sentinel
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.35
    environment:
      JAVA_OPTS: "-Xms64m -Xmx128m -XX:+UseSerialGC"
    ports:
      - "127.0.0.1:8858:8858"
    volumes:
      - D:/DockerFiles/mybilibili/sentinel/logs:/root/logs

  srs:
    image: registry.cn-hangzhou.aliyuncs.com/ossrs/srs:5
    container_name: mybilibili-srs
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    working_dir: /usr/local/srs
    command: ["./objs/srs", "-c", "conf/srs.conf"]
    ports:
      - "1935:1935"
      - "1985:1985"
      - "28080:28080"
      - "8000:8000/udp"
    volumes:
      - ../srs.conf:/usr/local/srs/conf/srs.conf:ro
      - D:/DockerFiles/mybilibili/srs/data:/usr/local/srs/objs/nginx/html

networks:
  default:
    external: true
    name: mybilibili-net
