server:
  port: 8088

spring:
  application:
    name: mybilibili-ai
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        import-check:
          enabled: false
  ai:
    openai:
      api-key: placeholder
      base-url: https://api.qnaigc.com
      chat:
        options:
          model: ${ai.deepseek.model:deepseek-chat}
          max-tokens: ${ai.deepseek.max-tokens:2000}
          temperature: ${ai.deepseek.temperature:0.7}
  data:
    mongodb:
      uri: mongodb://localhost:27017/mybilibili
      database: mybilibili
  datasource:
    url: jdbc:mysql://localhost:3306/mybilibili?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.mybilibili.common.entity
  configuration:
    map-underscore-to-camel-case: true

upload:
  base-path: d:/files/mybilibili/uploads

rocketmq:
  name-server: 127.0.0.1:9876
  consumer:
    group: video-process-group

ai:
  deepseek:
    api-key: ""
    api-url: "https://api.qnaigc.com"
    model: "deepseek-r1"
    max-tokens: 2000
    temperature: 0.7
  whisper:
    cli-path: "D:\\Program Files\\whisper-bin-x64\\Release\\whisper-cli.exe"
    model-path: "D:\\Program Files\\whisper-bin-x64\\Release\\models\\ggml-small.bin"
    language: zh
    threads: 4

logging:
  level:
    com.mybilibili: debug